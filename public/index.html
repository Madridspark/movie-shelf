<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080705" />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="preload" as="image" href="/assets/brand/movie-shelf-horizontal-white.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #080705;
      }

      #root:empty {
        display: grid;
        min-height: 100vh;
        align-content: center;
        justify-items: center;
        overflow: hidden;
        position: relative;
        background:
          linear-gradient(115deg, transparent 0%, rgba(255, 179, 38, 0.1) 48%, transparent 58%) -120vw 0 / 120vw 100% no-repeat,
          radial-gradient(circle at 50% 42%, rgba(255, 179, 38, 0.14), transparent 34%),
          radial-gradient(circle at 44% 49%, rgba(229, 24, 31, 0.1), transparent 28%),
          #080705;
        gap: 22px;
        animation: loading-backdrop 2.8s ease-in-out infinite;
      }

      #root:empty::before {
        width: min(284px, 72vw);
        aspect-ratio: 10 / 3;
        background: url('/assets/brand/movie-shelf-horizontal-white.png') center / contain no-repeat;
        content: '';
        filter: drop-shadow(0 18px 42px rgba(255, 179, 38, 0.18));
        animation: logo-pulse 1.8s ease-in-out infinite;
      }

      #root:empty::after {
        color: rgba(242, 237, 226, 0.68);
        content: '正在加载本周热映...';
        font: 800 15px/1.4 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        animation: text-pulse 1.2s ease-in-out infinite;
      }

      @keyframes loading-backdrop {
        0% {
          background-position: -120vw 0, center, center, center;
        }

        55%,
        100% {
          background-position: 120vw 0, center, center, center;
        }
      }

      @keyframes logo-pulse {
        0%,
        100% {
          opacity: 0.86;
          transform: scale(0.985);
        }

        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes text-pulse {
        0%,
        100% {
          opacity: 0.62;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
    <title>MovieShelf</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
