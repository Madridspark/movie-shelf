<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080705" />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="preload" as="image" href="/assets/brand/movie-shelf-horizontal-white.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #080705;
      }

      #root:empty {
        display: grid;
        min-height: 100vh;
        align-content: center;
        justify-items: center;
        background: radial-gradient(circle at 50% 42%, rgba(255, 179, 38, 0.12), transparent 34%), #080705;
        gap: 18px;
      }

      #root:empty::before {
        width: min(284px, 72vw);
        aspect-ratio: 10 / 3;
        background: url('/assets/brand/movie-shelf-horizontal-white.png') center / contain no-repeat;
        content: '';
      }

      #root:empty::after {
        color: rgba(242, 237, 226, 0.68);
        content: '正在加载本周热映...';
        font: 800 15px/1.4 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
    <title>MovieShelf</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
